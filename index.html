<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCoding Black Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            color: #ffffff;
        }

        /* Boshlash ekrani */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Preview maydoni */
        #preview-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: #000000;
        }

        /* Suzuvchi Kod Paneli */
        #editor-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 450px;
            height: 550px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            resize: both;
            overflow: hidden;
        }

        /* Panel sarlavhasi */
        #editor-header {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .header-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            margin-left: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .header-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #close-btn:hover {
            background: #ff4757;
            color: white;
        }

        /* Kod yozish maydoni */
        #code-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #00ffcc;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        #code-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Panelni qayta ochish tugmasi */
        #show-editor-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 5;
            backdrop-filter: blur(5px);
            display: none;
        }

        #show-editor-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">Boshlash</button>
    </div>

    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>

    <button id="show-editor-btn">Kodni ochish</button>

    <div id="editor-panel">
        <div id="editor-header">
            <span style="font-weight: bold; color: #fff;">&lt;/&gt; WebCoding</span>
            <div class="header-controls">
                <button id="clear-btn">Tozalash</button>
                <button id="close-btn">Yopish</button>
            </div>
        </div>
        <textarea id="code-input" spellcheck="false" placeholder="HTML, CSS (<style>) yoki JS (<script>) yozing...
Misol JS:
<script>
  alert('Salom, JS ishlamoqda!');
</script>"></textarea>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const editorPanel = document.getElementById('editor-panel');
        const editorHeader = document.getElementById('editor-header');
        const codeInput = document.getElementById('code-input');
        const previewFrame = document.getElementById('preview-frame');
        const closeBtn = document.getElementById('close-btn');
        const clearBtn = document.getElementById('clear-btn');
        const showEditorBtn = document.getElementById('show-editor-btn');

        // To'liq ekranga o'tish
        startBtn.addEventListener('click', () => {
            let de = document.documentElement;
            if (de.requestFullscreen) { de.requestFullscreen(); }
            else if (de.webkitRequestFullscreen) { de.webkitRequestFullscreen(); }
            startScreen.style.display = 'none';
            updatePreview(); // Birinchi marta bo'sh ekranni yuklash
        });

        // Avtomatik Preview (Debounce bilan)
        let typingTimer;
        const doneTypingInterval = 500; // 0.5 soniya kutish

        function updatePreview() {
            const code = codeInput.value;
            // Foydalanuvchi kodi bilan birga default qora fon va oq shriftni qoshib yuboramiz
            const fullCode = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { color: white; font-family: sans-serif; padding: 20px; }
                    </style>
                </head>
                <body>
                    ${code}
                </body>
                </html>
            `;
            previewFrame.srcdoc = fullCode;
        }

        codeInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(updatePreview, doneTypingInterval);
        });

        // Panelni ushlab tortish (Draggable)
        let isDragging = false, startX, startY, initialX, initialY;

        editorHeader.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialX = editorPanel.offsetLeft;
            initialY = editorPanel.offsetTop;
            editorPanel.style.transition = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            editorPanel.style.left = `${initialX + (e.clientX - startX)}px`;
            editorPanel.style.top = `${initialY + (e.clientY - startY)}px`;
        });

        document.addEventListener('mouseup', () => { isDragging = false; });

        // Yopish va Tozalash
        closeBtn.addEventListener('click', () => {
            editorPanel.style.display = 'none';
            showEditorBtn.style.display = 'block';
        });

        clearBtn.addEventListener('click', () => {
            codeInput.value = '';
            updatePreview();
        });

        showEditorBtn.addEventListener('click', () => {
            editorPanel.style.display = 'flex';
            showEditorBtn.style.display = 'none';
        });
    </script>
</body>
</html>
