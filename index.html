<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCoding Black Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            color: #ffffff;
        }

        /* Boshlash ekrani */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Preview maydoni */
        #preview-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: transparent; /* Fon qora bo'lib qolishi uchun */
        }

        /* Suzuvchi Kod Paneli */
        #editor-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 400px;
            height: 500px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            resize: both;
            overflow: hidden;
        }

        /* Panel sarlavhasi (ushlab tortish uchun) */
        #editor-header {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .header-controls button {
            background: none;
            border: none;
            color: #ccc;
            margin-left: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .header-controls button:hover {
            color: #fff;
        }

        #close-btn:hover {
            color: #ff4757;
        }

        /* Kod yozish maydoni */
        #code-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #00ffcc; /* Kod matni rangi */
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            resize: none;
            outline: none;
        }

        #code-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Panelni qayta ochish tugmasi */
        #show-editor-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 5;
            backdrop-filter: blur(5px);
            display: none;
        }

        #show-editor-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">Boshlash</button>
    </div>

    <iframe id="preview-frame"></iframe>

    <button id="show-editor-btn">Kodni ochish</button>

    <div id="editor-panel">
        <div id="editor-header">
            <span>&lt;/&gt; WebCoding</span>
            <div class="header-controls">
                <button id="clear-btn">Tozalash</button>
                <button id="close-btn">✖</button>
            </div>
        </div>
        <textarea id="code-input" placeholder="HTML, CSS (<style>) yoki JS (<script>) kodlarini bu yerga yozing..."></textarea>
    </div>

    <script>
        // DOM elementlari
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const editorPanel = document.getElementById('editor-panel');
        const editorHeader = document.getElementById('editor-header');
        const codeInput = document.getElementById('code-input');
        const previewFrame = document.getElementById('preview-frame');
        const closeBtn = document.getElementById('close-btn');
        const clearBtn = document.getElementById('clear-btn');
        const showEditorBtn = document.getElementById('show-editor-btn');

        // 1. To'liq ekranga o'tish (Boshlash)
        startBtn.addEventListener('click', () => {
            let de = document.documentElement;
            if (de.requestFullscreen) { de.requestFullscreen(); }
            else if (de.mozRequestFullScreen) { de.mozRequestFullScreen(); }
            else if (de.webkitRequestFullscreen) { de.webkitRequestFullscreen(); }
            else if (de.msRequestFullscreen) { de.msRequestFullscreen(); }
            
            startScreen.style.display = 'none';
        });

        // 2. Avtomatik Preview (Kod yozilganda yangilash)
        codeInput.addEventListener('input', () => {
            const code = codeInput.value;
            const doc = previewFrame.contentWindow.document;
            doc.open();
            // Default xatoliklarni oldini olish va oq shrift qo'shish
            doc.write(`
                <style>body { color: white; font-family: sans-serif; }</style>
                ${code}
            `);
            doc.close();
        });

        // 3. Panelni harakatlantirish (Draggable)
        let isDragging = false;
        let startX, startY, initialX, initialY;

        editorHeader.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialX = editorPanel.offsetLeft;
            initialY = editorPanel.offsetTop;
            editorPanel.style.transition = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            editorPanel.style.left = `${initialX + dx}px`;
            editorPanel.style.top = `${initialY + dy}px`;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 4. Boshqaruv tugmalari (Yopish va Tozalash)
        closeBtn.addEventListener('click', () => {
            editorPanel.style.display = 'none';
            showEditorBtn.style.display = 'block';
        });

        clearBtn.addEventListener('click', () => {
            codeInput.value = '';
            previewFrame.contentWindow.document.open();
            previewFrame.contentWindow.document.write('');
            previewFrame.contentWindow.document.close();
        });

        showEditorBtn.addEventListener('click', () => {
            editorPanel.style.display = 'flex';
            showEditorBtn.style.display = 'none';
        });
    </script>
</body>
</html>
